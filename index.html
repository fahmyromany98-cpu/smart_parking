<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Parking</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f4f6;
      color: #222;
      padding: 24px;
      transition:0.3s;
    }

    /* ── Header ─────────────────────────── */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .status-text {
      font-size: 13px;
      color: #666;
    }

    .dot-live {
      display:inline-block;
      width:8px;
      height:8px;
      background:#4caf50;
      border-radius:50%;
      margin-right:6px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50% { opacity:0.2; }
    }

    /* زرار الثيم */
    .theme-btn {
      position:absolute;
      right:0;
      top:0;
      border:none;
      background:#fff;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    /* ── Stats ──────────────────────────── */
    .stats {
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:35px;
      flex-wrap:wrap;
    }

    .stat {
      background:#ffffff;
      border-radius:16px;
      padding:18px 40px;
      text-align:center;
      min-width:150px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .stat .num {
      font-size:38px;
      font-weight:bold;
    }

    .stat .lbl {
      font-size:12px;
      color:#777;
      margin-top:6px;
    }

    .blue { color:#333; }
    .green { color:#4caf50; }
    .red { color:#f44336; }

    /* ── Section Title ─────────────────── */
    .section-title {
      max-width:800px;
      margin:0 auto 15px;
      font-size:13px;
      color:#777;
    }

    /* ── Grid Container ───────────────── */
    .grid-wrapper {
      background:#ffffff;
      border-radius:20px;
      padding:25px;
      max-width:850px;
      margin:0 auto;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);
      transition:0.3s;
    }

    /* ── Grid ───────────────────────────── */
    .grid {
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap:22px;
    }

    .card {
      border-radius:18px;
      padding:35px 20px;
      text-align:center;
      transition:0.2s;
      border:2px solid;
      background:#fff;
    }

    .card:hover {
      transform:translateY(-4px);
    }

    .free {
      border-color:#4caf50;
    }

    .occupied {
      border-color:#f44336;
    }

    .dot {
      width:18px;
      height:18px;
      border-radius:50%;
      margin:15px auto;
    }

    .free .dot {
      background:#4caf50;
    }

    .occupied .dot {
      background:#f44336;
    }

    .slot-num {
      font-size:12px;
      color:#888;
      margin-bottom:10px;
    }

    .status {
      font-weight:bold;
      font-size:14px;
    }

    .free .status {
      color:#4caf50;
    }

    .occupied .status {
      color:#f44336;
    }

    /* ── Footer ─────────────────────────── */
    .footer {
      text-align:center;
      font-size:11px;
      color:#aaa;
      margin-top:40px;
    }

    /* ───────── DARK MODE ───────── */
    .dark body {
      background:#121212;
      color:#eee;
    }

    .dark .stat,
    .dark .grid-wrapper,
    .dark .card {
      background:#1e1e1e;
      box-shadow:none;
    }

    .dark .section-title,
    .dark .status-text,
    .dark .slot-num {
      color:#aaa;
    }

    .dark .theme-btn {
      background:#222;
      color:#fff;
    }

    /* ✅ FIX: TOTAL number color in dark mode */
    .dark #s-total {
      color: #fff !important;
    }

  </style>
</head>

<body>

<!-- Header -->
<div class="header">
  <button id="themeToggle" class="theme-btn">🌙</button>

  <h1>Smart Parking System</h1>
  <div class="status-text">
    <span class="dot-live"></span>
    Live Parking Status
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="num blue" id="s-total">6</div>
    <div class="lbl">TOTAL</div>
  </div>

  <div class="stat">
    <div class="num green" id="s-free">—</div>
    <div class="lbl">EMPTY</div>
  </div>

  <div class="stat">
    <div class="num red" id="s-occ">—</div>
    <div class="lbl">TAKEN</div>
  </div>
</div>

<!-- Section Title -->
<div class="section-title">PARKING SLOTS</div>

<!-- Grid -->
<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<!-- Footer -->
<div class="footer">
  Smart Parking 2026
</div>

<script>
async function fetchStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();

    document.getElementById('s-total').textContent = data.total;
    document.getElementById('s-free').textContent  = data.available;
    document.getElementById('s-occ').textContent   = data.occupied;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    data.slots.forEach(slot => {
      const isFree = slot.status === 'free';

      grid.innerHTML += `
        <div class="card ${slot.status}">
          <div class="slot-num">SLOT ${slot.number}</div>
          <div class="dot"></div>
          <div class="status">${isFree ? 'EMPTY' : 'TAKEN'}</div>
        </div>
      `;
    });

  } catch(e) {
    console.error(e);
  }
}

fetchStatus();
setInterval(fetchStatus, 2000);

/* ── Theme Toggle ── */
const btn = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark") {
  document.documentElement.classList.add("dark");
  btn.textContent = "☀️";
}

btn.onclick = () => {
  document.documentElement.classList.toggle("dark");

  if (document.documentElement.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    btn.textContent = "☀️";
  } else {
    localStorage.setItem("theme", "light");
    btn.textContent = "🌙";
  }
};
</script>

</body>
</html>
